<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yehen Silva // Portfolio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' height='24px' viewBox='0 0 24 24' width='24px' fill='%23e3e3e3'%3E%3Cpath d='M0 0h24v24H0V0z' fill='none'/%3E%3Cpath d='M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        mono: ["'Share Tech Mono'", 'monospace'],
        display: ["'Syne'", 'sans-serif'],
        sans: ["'DM Sans'", 'sans-serif'],
      },
      colors: {
        bg: '#060606', surface: '#0a0a0a', panel: '#111111',
        accent: '#e8e8e8', 'accent-dim': '#a0a0a0', muted: '#505050',
        border: 'rgba(255,255,255,0.07)', highlight: '#ffffff',
      }
    }
  }
}
</script>

<style>
:root {
  --bg:#060606; --surface:#0a0a0a; --panel:#111111;
  --border:rgba(255,255,255,0.09);
  --accent:#ececec; --accent-dim:#c8c8c8;
  --muted:#9a9aaa; --highlight:#ffffff;
  --mono:'Share Tech Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;overflow-x:hidden;max-width:100vw;}
body{background:var(--bg);color:var(--accent);font-family:var(--sans);overflow-x:hidden;cursor:none;max-width:100vw;width:100%;}
body.loading{overflow:hidden;}

/* SCANLINE */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);pointer-events:none;z-index:8000;}

/* CURSOR */
#cur{position:fixed;width:10px;height:10px;background:#00f5ff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .18s,height .18s,background .2s;}
#cur-r{position:fixed;width:34px;height:34px;border:1.5px solid rgba(124,92,252,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s;}

/* ─── LINUX BOOT PRELOADER ─── */
#boot-screen{
  position:fixed;inset:0;background:#000;z-index:10000;display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  padding:clamp(1.5rem,5vw,4rem);
  font-family:var(--mono);overflow:hidden;
}
#boot-screen.exit{opacity:0;transform:translateY(-100%);transition:all 0.8s cubic-bezier(0.82,0,0.18,1);pointer-events:none;}
#boot-log{
  width:100%;max-width:900px;
  display:flex;flex-direction:column;gap:0;
  height:clamp(200px,55vh,420px);justify-content:flex-end;overflow:hidden;
}
.boot-line{
  font-size:clamp(.62rem,.95vw,.82rem);
  line-height:1.8;opacity:0;
  white-space:pre-wrap;word-break:break-word;
  transform:translateY(4px);
  transition:opacity 0.06s ease,transform 0.06s ease;
}
.boot-line.show{opacity:1;transform:translateY(0);}
.boot-ok{color:#39ff85;}
.boot-info{color:rgba(255,255,255,0.4);}
.boot-warn{color:#ffb300;}
.boot-neon{color:#7c5cfc;}
.boot-cyan{color:#00f5ff;}
.boot-err{color:#ff3dac;}
#boot-bar-row{margin-top:2rem;display:flex;align-items:center;gap:1.5rem;width:100%;max-width:900px;}
#boot-bar-wrap{flex:1;height:2px;background:rgba(255,255,255,0.05);position:relative;}
#boot-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c5cfc,#00f5ff);box-shadow:0 0 15px rgba(0,245,255,0.3);transition:width 0.1s linear;}
#boot-pct{font-size:.78rem;color:#7c5cfc;min-width:4ch;letter-spacing:.1em;}

/* PAGE REVEAL */
#page-reveal{position:fixed;inset:0;z-index:9999;pointer-events:none;display:grid;grid-template-columns:repeat(5,1fr);}
.reveal-strip{background:var(--bg);transform:scaleY(1);transform-origin:bottom;transition:transform .9s cubic-bezier(.16,1,.3,1);}
.reveal-strip.gone{transform:scaleY(0);}

/* PARTICLES */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}


/* PARALLAX ORBS */
.parallax-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.p-orb{position:absolute;border-radius:50%;filter:blur(80px);will-change:transform;}
.p-orb:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,rgba(124,92,252,0.6),transparent 70%);top:-150px;left:-150px;opacity:.25;animation:orbA 14s ease-in-out infinite;}
.p-orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,rgba(0,245,255,0.55),transparent 70%);top:40%;right:-100px;opacity:.20;animation:orbB 10s ease-in-out infinite;}
.p-orb:nth-child(3){width:450px;height:450px;background:radial-gradient(circle,rgba(255,61,172,0.5),transparent 70%);bottom:-80px;left:35%;opacity:.18;animation:orbA 16s ease-in-out infinite reverse;}

/* ─── GLOBAL PARALLAX SYSTEM ─── */
/* Every parallax layer uses CSS custom props set by JS */
[data-prlx]{will-change:transform;}

/* Section bg layers slide at 0.3× scroll */
.prlx-bg{position:absolute;inset:-20%;width:140%;height:140%;pointer-events:none;z-index:0;will-change:transform;transition:transform .05s linear;}

/* Section floating orbs — bigger, more dramatic */
.prlx-orb{position:absolute;border-radius:50%;pointer-events:none;will-change:transform;transition:transform .08s linear;}
.prlx-orb-a{width:600px;height:600px;background:radial-gradient(circle,rgba(124,92,252,0.35),transparent 65%);filter:blur(70px);}
.prlx-orb-b{width:400px;height:400px;background:radial-gradient(circle,rgba(0,245,255,0.3),transparent 65%);filter:blur(60px);}
.prlx-orb-c{width:350px;height:350px;background:radial-gradient(circle,rgba(255,61,172,0.28),transparent 65%);filter:blur(55px);}
.prlx-orb-d{width:300px;height:300px;background:radial-gradient(circle,rgba(57,255,133,0.22),transparent 65%);filter:blur(50px);}

/* Parallax enter — elements slide up as they enter viewport */
.prlx-enter{opacity:0;transform:translateY(60px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);}
.prlx-enter.in{opacity:1;transform:translateY(0);}
.prlx-enter-left{opacity:0;transform:translateX(-60px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);}
.prlx-enter-left.in{opacity:1;transform:translateX(0);}
.prlx-enter-right{opacity:0;transform:translateX(60px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);}
.prlx-enter-right.in{opacity:1;transform:translateX(0);}
.prlx-enter-scale{opacity:0;transform:scale(0.88) translateY(40px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);}
.prlx-enter-scale.in{opacity:1;transform:scale(1) translateY(0);}

/* Stagger delays */
.prlx-d1{transition-delay:.08s!important;}
.prlx-d2{transition-delay:.18s!important;}
.prlx-d3{transition-delay:.28s!important;}
.prlx-d4{transition-delay:.38s!important;}
.prlx-d5{transition-delay:.5s!important;}

/* Footer parallax */
footer{position:relative;overflow:hidden;}
.footer-prlx-bg{position:absolute;inset:0;pointer-events:none;z-index:0;}
footer>*:not(.footer-prlx-bg){position:relative;z-index:1;}

/* FLOATING GLYPHS */
.fg{position:absolute;font-family:var(--mono);opacity:0;pointer-events:none;animation:fgRise linear infinite;will-change:transform,opacity;}


/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 3rem;background:rgba(6,6,6,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transform:translateY(-100%);transition:transform .8s cubic-bezier(.16,1,.3,1);}
nav.visible{transform:translateY(0);}
.nav-inner{max-width:1100px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;padding:1.3rem 0;}
.nav-id{font-family:var(--mono);font-size:.78rem;color:#00f5ff;letter-spacing:.12em;display:flex;align-items:center;gap:.6rem;text-shadow:0 0 12px #00f5ff;}
.nav-id::before{content:'>';color:var(--muted);animation:blink 1.2s step-end infinite;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-family:var(--mono);font-size:.68rem;color:#909090;text-decoration:none;letter-spacing:.15em;text-transform:uppercase;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#00f5ff;box-shadow:0 0 6px #00f5ff;transition:width .3s;}
.nav-links a:hover{color:#00f5ff;text-shadow:0 0 8px rgba(0,245,255,0.5);}
.nav-links a:hover::after{width:100%;}
.nav-dot{display:flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.68rem;color:var(--muted);}
.dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:pulseSlow 2s ease-in-out infinite;}

/* MOBILE CLOSE BUTTON inside menu */
.mob-close-btn{display:flex;align-items:center;justify-content:center;position:absolute;top:1.2rem;right:1.4rem;width:40px;height:40px;background:none;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-family:var(--mono);font-size:1.1rem;color:var(--muted);transition:all .25s;border-radius:2px;}
.mob-close-btn:hover{color:#ff3dac;border-color:rgba(255,61,172,0.5);box-shadow:0 0 16px rgba(255,61,172,0.2);}

/* HERO */
#hero{min-height:100vh;display:grid;grid-template-columns:1fr 1.4fr;align-items:center;padding:7rem 3rem 4rem;position:relative;overflow:clip;gap:2rem;}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 90% 90% at 40% 50%,black,transparent);pointer-events:none;}
.hero-aurora{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.hero-aurora::before{content:'';position:absolute;width:600px;height:400px;background:radial-gradient(ellipse,rgba(255,255,255,.06) 0%,transparent 70%);top:10%;left:-10%;animation:auroraA 8s ease-in-out infinite;}
.hero-aurora::after{content:'';position:absolute;width:500px;height:350px;background:radial-gradient(ellipse,rgba(200,200,200,.04) 0%,transparent 70%);bottom:0;right:0;animation:auroraB 10s ease-in-out infinite;}
.hero-eyebrow{font-family:var(--mono);font-size:.72rem;color:#00f5ff;letter-spacing:.25em;text-transform:uppercase;margin-bottom:1.4rem;display:flex;align-items:center;gap:.8rem;opacity:0;animation:fadeUp .8s .1s cubic-bezier(.16,1,.3,1) forwards;text-shadow:0 0 16px rgba(0,245,255,0.6);}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:#00f5ff;box-shadow:0 0 6px #00f5ff;}
.hero-name{font-family:var(--display);font-weight:800;font-size:clamp(3rem,5.5vw,5.5rem);line-height:.95;letter-spacing:-.03em;margin-bottom:1rem;}
.hero-name .n1{display:block;color:#fff;overflow:hidden;}
.hero-name .n1-inner{display:block;animation:slideUp .9s .3s cubic-bezier(.16,1,.3,1) both;}
.hero-name .n2{display:block;overflow:hidden;}
.hero-name .n2-inner{display:block;background:linear-gradient(110deg,#7c5cfc,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:slideUp .9s .45s cubic-bezier(.16,1,.3,1) both;}
.hero-role{font-family:var(--mono);font-size:.8rem;font-weight:400;color:#b8b8c8;margin-bottom:1.8rem;line-height:2.1;opacity:0;animation:fadeUp .8s .6s cubic-bezier(.16,1,.3,1) forwards;}
.hero-role .hl{color:#7c5cfc;text-shadow:0 0 10px rgba(124,92,252,0.5);}
.hero-bio{font-size:.93rem;color:rgba(255,255,255,0.55);line-height:1.85;max-width:440px;margin-bottom:2.2rem;opacity:0;animation:fadeUp .8s .75s cubic-bezier(.16,1,.3,1) forwards;}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp .8s .9s cubic-bezier(.16,1,.3,1) forwards;margin-bottom:2rem;}
.btn-p{font-family:var(--mono);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;padding:.85rem 1.8rem;background:#fff;color:#000;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:all .3s;position:relative;overflow:hidden;font-weight:600;cursor:pointer;}
.btn-p::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);transform:translateX(-100%);transition:transform .4s;}
.btn-p:hover::after{transform:translateX(100%);}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,255,255,.15);}
.btn-g{font-family:var(--mono);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;padding:.85rem 1.8rem;background:transparent;color:var(--muted);border:1px solid var(--border);text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:all .3s;}
.btn-g:hover{color:#fff;border-color:rgba(255,255,255,0.3);box-shadow:0 0 24px rgba(255,255,255,0.05);transform:translateY(-2px);}
.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:0;animation:fadeUp 1s 1.8s forwards;}
.scroll-hint span{font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
.scroll-ln{width:1px;height:36px;background:linear-gradient(to bottom,#7c5cfc,transparent);box-shadow:0 0 6px #7c5cfc;animation:scrollLine 2s ease-in-out infinite;}
.f-badge{position:absolute;font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;padding:.4rem .9rem;border:1px solid;text-transform:uppercase;backdrop-filter:blur(8px);pointer-events:none;z-index:3;animation:badgeFloat ease-in-out infinite;}

/* SECTIONS */
section{padding:7rem clamp(1.4rem,5vw,6rem);position:relative;transform-style:preserve-3d;}
.section-inner{max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:1;}

/* ABOUT — bright light section */
#about{border-top:none;background:#f0f0f5;position:relative;}
#about::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#f8f8ff 0%,#ededf7 50%,#e8e8f2 100%);z-index:0;}
#about .sec-num{color:#5a3ecc;}
#about .sec-title{color:#0a0a14;}
#about .sec-line::after{background:linear-gradient(90deg,#5a3ecc,#0891b2,transparent);}
#about .about-text p{color:rgba(10,10,30,0.65);}
#about .about-text p strong{color:rgba(10,10,30,0.9);}
#about .about-text .ac{color:#5a3ecc;}
#about .sk-meta{color:rgba(10,10,30,0.45);}
#about .sk-bar{background:rgba(0,0,0,.08);}
#about .tag{border-color:rgba(90,62,204,0.2);color:rgba(10,10,30,0.5);}
#about .tag:hover{border-color:rgba(90,62,204,0.5);color:#5a3ecc;background:rgba(90,62,204,.08);}
#about .parallax-wrap{display:none;}

/* STATS — dark with animated canvas background */
#stats{border-top:1px solid var(--border);background:#060610;position:relative;overflow:hidden;}
#stats-canvas-bg{position:absolute;inset:0;z-index:0;pointer-events:none;}

/* WORK — pure white light section */
#work{border-top:none;background:#ffffff;position:relative;}
#work::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#ffffff 0%,#fafafa 60%,#f5f5ff 100%);z-index:0;}
#work .sec-num{color:#5a3ecc;}
#work .sec-title{color:#0a0a14;}
#work .sec-line::after{background:linear-gradient(90deg,#5a3ecc,#0891b2,transparent);}
#work .proj{border-bottom-color:rgba(0,0,0,0.08);color:#0a0a14;}
#work .proj:hover{background:rgba(90,62,204,0.03);}
#work .proj:hover .proj-title{color:#5a3ecc;text-shadow:none;}
#work .proj:hover .proj-arr{color:#5a3ecc;text-shadow:none;}
#work .proj-n{color:#5a3ecc;text-shadow:none;}
#work .proj-title{color:rgba(10,10,30,0.85);}
#work .proj-desc{color:rgba(10,10,30,0.45);}
#work .chip{background:rgba(90,62,204,0.06);color:#5a3ecc;border-color:rgba(90,62,204,0.2);}
#work .proj-arr{color:rgba(10,10,30,0.25);}

/* EXPERIENCE — dark with a hint of deep navy */
#experience{border-top:1px solid var(--border);background:linear-gradient(180deg,#06060e 0%,#080814 100%);}

/* STACK — moving gradient background */
#stack{border-top:1px solid var(--border);position:relative;overflow:hidden;background:#060610;}
#stack::before{
  content:'';position:absolute;inset:-60%;width:220%;height:220%;
  background:radial-gradient(ellipse at 20% 50%,rgba(124,92,252,0.18) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(0,245,255,0.12) 0%,transparent 45%),
             radial-gradient(ellipse at 60% 80%,rgba(255,61,172,0.10) 0%,transparent 45%),
             radial-gradient(ellipse at 10% 80%,rgba(57,255,133,0.07) 0%,transparent 40%),
             #060610;
  animation:stackGradDrift 12s ease-in-out infinite alternate;
  pointer-events:none;z-index:0;
}
@keyframes stackGradDrift{
  0%  {transform:translate(0%,0%) scale(1);}
  25% {transform:translate(3%,-4%) scale(1.04);}
  50% {transform:translate(-4%,3%) scale(1.02);}
  75% {transform:translate(5%,2%) scale(1.05);}
  100%{transform:translate(-2%,-3%) scale(1.03);}
}
#stack .section-inner{position:relative;z-index:1;}
#stack .stack-items-panel .stack-item-row{background:rgba(10,8,22,0.7);border-color:rgba(124,92,252,0.14);backdrop-filter:blur(12px);}
#stack .stack-items-panel .stack-item-row.active-row,
#stack .stack-items-panel .stack-item-row:hover{border-color:rgba(124,92,252,0.4);background:rgba(14,10,32,0.85);}
#stack .stack-detail-panel{background:rgba(8,6,20,0.85);backdrop-filter:blur(20px);}
#stack .si-name{color:var(--muted);}
#stack .stack-item-row.active-row .si-name,
#stack .stack-item-row:hover .si-name{color:rgba(255,255,255,0.85);}

/* CONTACT — back to deep dark */
#contact{border-top:1px solid var(--border);background:linear-gradient(180deg,#06060e,#0a0a16);text-align:center;}

/* Override old inline z-index wrappers for light sections */
#about .about-grid,#work .proj-list{position:relative;z-index:1;}
#stack .stack-grid{position:relative;z-index:1;}

.sec-hdr{display:flex;align-items:center;gap:1.5rem;margin-bottom:4rem;}
.sec-num{font-family:var(--mono);font-size:.68rem;color:#7c5cfc;letter-spacing:.2em;text-shadow:0 0 10px rgba(124,92,252,0.5);}
.sec-title{font-family:var(--display);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;letter-spacing:-.02em;color:#fff;}
.sec-line{flex:1;height:1px;background:var(--border);position:relative;overflow:hidden;}
.sec-line::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,#7c5cfc,#00f5ff,transparent);transform:translateX(-100%);transition:transform 1.2s cubic-bezier(.16,1,.3,1) .4s;}
.sec-line.on::after{transform:translateX(0);}

/* Light section sec-hdr overrides */
#about .sec-hdr .sec-line,#work .sec-hdr .sec-line{background:rgba(0,0,0,0.1);}
#about .sec-hdr,#work .sec-hdr{opacity:1;}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;}
.about-text p{font-size:.93rem;line-height:1.9;color:rgba(255,255,255,0.65);margin-bottom:1.4rem;}
.about-text p strong{color:rgba(255,255,255,0.9);font-weight:500;}
.about-text .ac{color:rgba(255,255,255,0.8);}
.sk-rows{display:flex;flex-direction:column;gap:1.1rem;}
.sk-row{display:flex;flex-direction:column;gap:.4rem;}
.sk-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.66rem;color:var(--muted);letter-spacing:.1em;}
.sk-bar{height:2px;background:rgba(255,255,255,.04);overflow:hidden;position:relative;}
.sk-fill{height:100%;background:linear-gradient(90deg,#7c5cfc,#00f5ff);box-shadow:0 0 8px rgba(124,92,252,0.5);width:0%;transition:width 1.6s cubic-bezier(.16,1,.3,1);}
.tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:2rem;}
.tag{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;padding:.35rem .8rem;border:1px solid rgba(255,255,255,0.14);color:#a0a0b8;text-transform:uppercase;transition:all .25s;cursor:default;}
.tag:hover{border-color:rgba(124,92,252,0.5);color:#7c5cfc;background:rgba(124,92,252,.06);text-shadow:0 0 8px rgba(124,92,252,0.4);transform:translateY(-2px);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;}
.stat-card{text-align:center;padding:2.5rem 1.5rem;border:1px solid var(--border);position:relative;overflow:hidden;transition:all .4s cubic-bezier(.16,1,.3,1);background:rgba(10,10,10,0.6);backdrop-filter:blur(10px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c5cfc,#00f5ff);box-shadow:0 0 12px rgba(124,92,252,0.5);transform:scaleX(0);transition:transform .6s cubic-bezier(.16,1,.3,1);}
.stat-card:hover::before{transform:scaleX(1);}
.stat-card:hover{border-color:rgba(124,92,252,.25);transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,.7);}
.stat-num{font-family:var(--display);font-size:clamp(2.5rem,5vw,4rem);font-weight:800;letter-spacing:-.04em;color:#fff;position:relative;z-index:1;}
.stat-label{font-family:var(--mono);font-size:.65rem;color:#909090;letter-spacing:.2em;text-transform:uppercase;margin-top:.6rem;position:relative;z-index:1;}
.stat-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.025),transparent);transform:translateX(-100%);}
.stat-card:hover .stat-shimmer{transition:transform .8s ease;transform:translateX(200%);}

/* PROJECTS */
.proj-list{display:flex;flex-direction:column;}
.proj{display:grid;grid-template-columns:60px 1fr 30px;gap:2rem;align-items:center;padding:1.8rem 0;border-bottom:1px solid var(--border);transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;}
.proj::before{content:'';position:absolute;left:-100%;top:0;bottom:0;width:100%;background:linear-gradient(90deg,transparent,rgba(124,92,252,.06),transparent);transition:left .6s cubic-bezier(.16,1,.3,1);}
.proj:hover::before{left:100%;}
.proj:hover{padding-left:.6rem;}
.proj:hover .proj-title{color:#00f5ff;text-shadow:0 0 16px rgba(0,245,255,0.4);}
.proj:hover .proj-arr{transform:translate(3px,-3px);color:#00f5ff;text-shadow:0 0 10px #00f5ff;}
.proj-n{font-family:var(--mono);font-size:.66rem;color:#7c5cfc;letter-spacing:.15em;text-shadow:0 0 8px rgba(124,92,252,0.4);}
.proj-title{font-family:var(--display);font-size:1.25rem;font-weight:700;margin-bottom:.3rem;transition:color .3s;color:rgba(255,255,255,0.85);}
.proj-desc{font-size:.83rem;color:#9a9aaa;line-height:1.65;}
.proj-chips{display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap;}
.chip{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;padding:.2rem .55rem;background:rgba(124,92,252,.07);color:#7c5cfc;border:1px solid rgba(124,92,252,.2);text-transform:uppercase;transition:all .2s;}
.chip:hover{background:rgba(124,92,252,.14);}
.proj-arr{font-size:1.1rem;color:var(--muted);font-family:var(--mono);transition:all .3s cubic-bezier(.16,1,.3,1);}

/* EXPERIENCE */
.tl-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;}
.tl-col-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.2em;margin-bottom:2rem;color:#7c5cfc;text-shadow:0 0 10px rgba(124,92,252,0.4);}
.timeline{position:relative;padding-left:2rem;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(124,92,252,0.4) 20%,rgba(0,245,255,0.3) 80%,transparent);}
.tl-item{position:relative;padding:0 0 3rem 2.5rem;opacity:0;transform:translateX(-20px);transition:all .7s cubic-bezier(.16,1,.3,1);}
.tl-item.on{opacity:1;transform:none;}
.tl-dot{position:absolute;left:-2rem;top:.35rem;width:12px;height:12px;border-radius:50%;background:#7c5cfc;border:2px solid var(--bg);transform:translateX(-5px);box-shadow:0 0 16px rgba(124,92,252,0.5);animation:pulseSlow 2.5s ease-in-out infinite;}
.tl-dot.c{background:#00f5ff;box-shadow:0 0 16px rgba(0,245,255,0.4);}
.tl-dot.p{background:#ff3dac;box-shadow:0 0 16px rgba(255,61,172,0.4);}
.tl-date{font-family:var(--mono);font-size:.65rem;color:#7c5cfc;letter-spacing:.15em;margin-bottom:.4rem;}
.tl-role{font-family:var(--display);font-size:1.1rem;font-weight:700;margin-bottom:.25rem;color:#fff;}
.tl-org{font-family:var(--mono);font-size:.7rem;color:#00f5ff;margin-bottom:.8rem;}
.tl-desc{font-size:.88rem;color:rgba(220,220,235,0.7);line-height:1.8;}
.tl-tags{display:flex;gap:.4rem;margin-top:.8rem;flex-wrap:wrap;}
.tl-tag{font-family:var(--mono);font-size:.58rem;padding:.2rem .6rem;border:1px solid rgba(124,92,252,.25);color:#a0a0b8;text-transform:uppercase;}

/* STACK — new spectacular version */
.stack-tabs{display:flex;gap:0;margin-bottom:3rem;border:1px solid var(--border);overflow:hidden;width:fit-content;}
.stack-tab{font-family:var(--mono);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:.65rem 1.4rem;background:transparent;color:var(--muted);border:none;border-right:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.stack-tab:last-child{border-right:none;}
.stack-tab::before{content:'';position:absolute;inset:0;background:rgba(124,92,252,0.1);transform:scaleY(0);transform-origin:bottom;transition:transform .25s;}
.stack-tab.active{color:#00f5ff;background:rgba(0,245,255,0.04);}
.stack-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00f5ff,transparent);box-shadow:0 0 8px #00f5ff;}
.stack-tab:hover:not(.active){color:rgba(255,255,255,0.6);}
.stack-tab:hover:not(.active)::before{transform:scaleY(1);}

.stack-showcase{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:start;}
.stack-items-panel{display:flex;flex-direction:column;gap:.6rem;}
.stack-item-row{display:flex;align-items:center;gap:1.2rem;padding:1rem 1.2rem;border:1px solid var(--border);background:rgba(10,10,15,0.7);cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;}
.stack-item-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--row-accent,#7c5cfc);transform:scaleY(0);transition:transform .3s cubic-bezier(.16,1,.3,1);}
.stack-item-row:hover,.stack-item-row.active-row{background:rgba(124,92,252,0.05);border-color:rgba(124,92,252,0.25);}
.stack-item-row:hover::before,.stack-item-row.active-row::before{transform:scaleY(1);}
.si-icon{font-size:1.3rem;flex-shrink:0;width:2rem;text-align:center;}
.si-info{flex:1;min-width:0;}
.si-name{font-family:var(--mono);font-size:.72rem;color:rgba(255,255,255,0.75);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem;}
.si-bar-wrap{height:2px;background:rgba(255,255,255,0.05);overflow:hidden;position:relative;}
.si-bar-fill{height:100%;transition:width 1s cubic-bezier(.16,1,.3,1);}
.si-pct{font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-left:.6rem;flex-shrink:0;width:2.5rem;text-align:right;}

.stack-detail-panel{position:sticky;top:6rem;background:rgba(8,8,16,0.9);border:1px solid rgba(124,92,252,0.2);padding:2rem;backdrop-filter:blur(20px);min-height:320px;display:flex;flex-direction:column;}
.sdp-top{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.sdp-icon{font-size:2.6rem;line-height:1;}
.sdp-meta{flex:1;}
.sdp-name{font-family:var(--display);font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:.2rem;}
.sdp-level{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;padding:.2rem .6rem;border:1px solid;display:inline-block;margin-bottom:.5rem;}
.sdp-level.proficient{color:#39ff85;border-color:rgba(57,255,133,0.4);background:rgba(57,255,133,0.06);}
.sdp-level.intermediate{color:#00f5ff;border-color:rgba(0,245,255,0.4);background:rgba(0,245,255,0.06);}
.sdp-level.learning{color:#ffb300;border-color:rgba(255,179,0,0.4);background:rgba(255,179,0,0.06);}
.sdp-level.exploring{color:#ff3dac;border-color:rgba(255,61,172,0.4);background:rgba(255,61,172,0.06);}
.sdp-level.daily{color:#7c5cfc;border-color:rgba(124,92,252,0.4);background:rgba(124,92,252,0.06);}
.sdp-desc{font-size:.82rem;color:rgba(255,255,255,0.7);line-height:1.8;margin-bottom:1.2rem;flex:1;}
.sdp-tags-label{font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.6rem;}
.sdp-tags{display:flex;flex-wrap:wrap;gap:.4rem;}
.sdp-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;padding:.2rem .55rem;border:1px solid rgba(255,255,255,0.1);color:#a0a0b8;text-transform:uppercase;transition:all .2s;}
.sdp-tag:hover{border-color:rgba(124,92,252,0.5);color:#7c5cfc;}
.sdp-bar-section{margin-top:auto;padding-top:1.2rem;border-top:1px solid var(--border);}
.sdp-bar-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.6rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.5rem;}
.sdp-bar-outer{height:3px;background:rgba(255,255,255,.04);overflow:hidden;}
.sdp-bar-inner{height:100%;transition:width 1s cubic-bezier(.16,1,.3,1);}

/* mobile stack */
@media(max-width:768px){
  .stack-showcase{grid-template-columns:1fr;gap:1.5rem;}
  .stack-detail-panel{position:static;min-height:auto;}
  .stack-tabs{width:100%;overflow-x:auto;}
  .stack-tab{font-size:.56rem;padding:.55rem .9rem;}
}

/* MARQUEE */
.mq-wrap{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:.9rem 0;background:var(--surface);}
.mq-track{display:flex;width:max-content;animation:waveFlow 28s linear infinite;}
.mq-item{font-family:var(--mono);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:#888;padding:0 2.5rem;white-space:nowrap;display:flex;align-items:center;gap:.8rem;}
.mq-dot{width:4px;height:4px;border-radius:50%;background:#7c5cfc;box-shadow:0 0 5px #7c5cfc;flex-shrink:0;}

/* CONTACT */
.contact-wrap{max-width:720px;margin:0 auto;}
.contact-big{font-family:var(--display);font-size:clamp(2.5rem,6vw,5rem);font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:1.2rem;color:#fff;}
.contact-big span{background:linear-gradient(110deg,#7c5cfc,#00f5ff,#ff3dac);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 4s linear infinite;}
.contact-sub{font-family:var(--mono);font-size:.75rem;color:#b0b0c0;margin-bottom:2rem;letter-spacing:.05em;}
.c-links{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;}
.c-link{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#b0b0c4;text-decoration:none;display:flex;align-items:center;gap:.5rem;padding:.8rem 1.4rem;border:1px solid var(--border);transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;}
.c-link::before{content:'';position:absolute;inset:0;background:rgba(124,92,252,0.07);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.c-link:hover::before{transform:scaleX(1);}
.c-link:hover{color:#7c5cfc;border-color:rgba(124,92,252,0.4);box-shadow:0 0 20px rgba(124,92,252,.15);}
.c-link .arr{transition:transform .3s cubic-bezier(.16,1,.3,1);}
.c-link:hover .arr{transform:translate(3px,-3px);}

/* CONTACT FORM */
.cf-wrap{background:rgba(10,10,10,0.8);border:1px solid var(--border);padding:2.5rem;margin-top:2.5rem;text-align:left;position:relative;overflow:hidden;}
.cf-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#7c5cfc,#00f5ff,transparent);}
.cf-title{font-family:var(--mono);font-size:.68rem;color:#00f5ff;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:.6rem;}
.cf-title::before{content:'$';color:#7c5cfc;}
.cf-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.cf-field{display:flex;flex-direction:column;gap:.4rem;}
.cf-field label{font-family:var(--mono);font-size:.6rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}
.cf-field input,.cf-field textarea,.cf-field select{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--accent);font-family:var(--mono);font-size:.75rem;padding:.7rem 1rem;outline:none;transition:all .25s;resize:none;width:100%;letter-spacing:.05em;}
.cf-field input:focus,.cf-field textarea:focus,.cf-field select:focus{border-color:rgba(124,92,252,0.5);background:rgba(124,92,252,.04);box-shadow:0 0 0 1px rgba(124,92,252,0.15);}
.cf-field input::placeholder,.cf-field textarea::placeholder{color:rgba(255,255,255,.15);}
.cf-field select option{background:#111;color:#e8e8e8;}
.cf-full{grid-column:1/-1;}
.cf-submit{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:1rem;}
.cf-note{font-family:var(--mono);font-size:.58rem;color:rgba(255,255,255,.2);letter-spacing:.08em;}
.cf-success{display:none;font-family:var(--mono);font-size:.72rem;color:#39ff85;letter-spacing:.1em;padding:.7rem 1.2rem;border:1px solid rgba(57,255,133,0.25);background:rgba(57,255,133,.05);}
.cf-success.show{display:block;}

/* FOOTER */
footer{padding:2.5rem 3rem;background:#000;border-top:1px solid rgba(124,92,252,0.2);display:flex;flex-direction:column;align-items:center;gap:1.4rem;position:relative;overflow:hidden;}
footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:280px;height:1px;background:linear-gradient(90deg,transparent,#7c5cfc,#00f5ff,transparent);box-shadow:0 0 20px rgba(124,92,252,0.4);}
.f-logo{font-family:var(--display);font-size:1.3rem;font-weight:800;letter-spacing:-.03em;color:#fff;}
.f-logo span{background:linear-gradient(110deg,#7c5cfc,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.f-links{display:flex;gap:1.8rem;list-style:none;}
.f-links a{font-family:var(--mono);font-size:.62rem;color:#a8a8bc;text-decoration:none;letter-spacing:.15em;text-transform:uppercase;transition:color .2s;}
.f-links a:hover{color:#00f5ff;}
.f-bottom{display:flex;align-items:center;gap:1.2rem;}
.f-copy{font-family:var(--mono);font-size:.6rem;color:rgba(255,255,255,0.45);letter-spacing:.1em;}
.f-dot{width:3px;height:3px;border-radius:50%;background:#7c5cfc;box-shadow:0 0 4px #7c5cfc;}
.f-status{font-family:var(--mono);font-size:.6rem;color:rgba(255,255,255,0.38);letter-spacing:.1em;}
.side-lbl{position:fixed;left:1.2rem;bottom:5rem;writing-mode:vertical-rl;font-family:var(--mono);font-size:.6rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;opacity:.4;display:flex;align-items:center;gap:.8rem;}
.side-lbl::after{content:'';width:1px;height:50px;background:#7c5cfc;box-shadow:0 0 6px #7c5cfc;}

/* TERM MINI */
.term-mini{background:var(--panel);border:1px solid var(--border);padding:1.1rem 1.3rem;max-width:400px;opacity:0;animation:fadeUp .8s 1.1s cubic-bezier(.16,1,.3,1) forwards;position:relative;overflow:hidden;}
.term-mini::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none;}
.term-bar{display:flex;gap:.4rem;margin-bottom:.9rem;align-items:center;}
.td{width:9px;height:9px;border-radius:50%;transition:transform .2s;}
.td:hover{transform:scale(1.3);}
.td:nth-child(1){background:#ff5f57}.td:nth-child(2){background:#febc2e}.td:nth-child(3){background:#28c840}
.term-ttl{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-left:auto;letter-spacing:.08em;}
.term-body{font-family:var(--mono);font-size:.73rem;line-height:2;color:var(--muted);}
.tp{color:rgba(255,255,255,0.6)}.tc{color:rgba(255,255,255,0.8)}.to{padding-left:1.4rem}.th{color:rgba(255,255,255,0.5)}
.tc-blink::after{content:'█';color:rgba(255,255,255,0.5);animation:blink 1s step-end infinite;}

/* KEYFRAMES */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulseSlow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes scrollLine{0%{opacity:1;transform:scaleY(1) translateY(0)}100%{opacity:0;transform:scaleY(.4) translateY(18px)}}
@keyframes orbA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-25px) scale(1.1)}66%{transform:translate(-20px,35px) scale(.93)}}
@keyframes orbB{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,20px)}}
@keyframes fgRise{0%{transform:translateY(100vh);opacity:0}8%{opacity:.05}90%{opacity:.05}100%{transform:translateY(-20vh);opacity:0}}
@keyframes badgeFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes auroraA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,3%) scale(1.1)}}
@keyframes auroraB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5%,-3%) scale(1.15)}}
@keyframes waveFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes gradShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* ─── HAMBURGER NAV ─── */
.ham-btn{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:none;border:none;cursor:pointer;padding:4px;z-index:1100;flex-shrink:0;}
.ham-btn span{display:block;height:1.5px;background:#00f5ff;box-shadow:0 0 6px #00f5ff;transition:all .3s cubic-bezier(.16,1,.3,1);transform-origin:center;}
.ham-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.ham-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.ham-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

.mobile-menu{display:none;position:fixed;inset:0;top:0;background:rgba(6,6,6,0.98);backdrop-filter:blur(24px);z-index:1050;flex-direction:column;align-items:center;justify-content:center;gap:0;opacity:0;transform:translateY(-10px);transition:opacity .35s cubic-bezier(.16,1,.3,1),transform .35s cubic-bezier(.16,1,.3,1);pointer-events:none;}
.mobile-menu.open{opacity:1;transform:none;pointer-events:all;}
.mobile-menu a{font-family:var(--mono);font-size:1.3rem;letter-spacing:.2em;color:var(--muted);text-decoration:none;text-transform:uppercase;padding:1.1rem 2rem;border-bottom:1px solid var(--border);width:100%;text-align:center;transition:color .2s,background .2s;}
.mobile-menu a:first-child{border-top:1px solid var(--border);}
.mobile-menu a:hover{color:#00f5ff;background:rgba(0,245,255,0.04);}
.mobile-menu-status{font-family:var(--mono);font-size:.6rem;color:#7c5cfc;letter-spacing:.2em;text-transform:uppercase;margin-top:2rem;opacity:.5;}

/* ─── MOBILE ─── */
@media(max-width:768px){
  html,body{overflow-x:hidden;width:100%;max-width:100vw;}
  body{cursor:auto;}
  #cur,#cur-r,.side-lbl{display:none!important;}
  #particles{display:none;}

  /* NAV */
  nav{padding:0 1rem;left:0;right:0;width:100%;}
  .nav-inner{padding:.85rem 0;width:100%;max-width:100%;display:flex;align-items:center;justify-content:space-between;}
  .nav-id{font-size:.68rem;letter-spacing:.08em;}
  .nav-links{display:none;}
  .nav-dot{display:none;}
  .ham-btn{display:flex;flex-shrink:0;}
  .mobile-menu{display:flex;}

  /* HERO */
  #hero{
    grid-template-columns:1fr;
    padding:4.8rem 1rem 2.5rem;
    gap:0;
    min-height:auto;
    width:100%;
    overflow:clip;

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useScrollReveal(threshold=0.12){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return[ref,vis];
}

function useMouseParallax(strength=12){
  const ref=useRef(null);
  useEffect(()=>{
    const h=(e)=>{const el=ref.current;if(!el)return;const mx=(e.clientX/window.innerWidth-0.5)*2;const my=(e.clientY/window.innerHeight-0.5)*2;el.style.transform=`translate(${mx*strength}px,${my*(strength*0.6)}px)`;};
    window.addEventListener('mousemove',h);return()=>window.removeEventListener('mousemove',h);
  },[strength]);
  return ref;
}

function RGBPcScene(){
  const mountRef=useRef(null);
  useEffect(()=>{
    const el=mountRef.current;if(!el)return;
    let W=el.clientWidth,H=el.clientHeight;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    el.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(50,W/H,0.1,100);
    camera.position.set(0,0,7);
    scene.add(new THREE.AmbientLight(0x111122,0.6));
    [[0x7c5cfc,[4,4,3],6],[0x00f5ff,[-4,2,4],5],[0xff3dac,[0,-4,3],4],[0x39ff85,[-3,3,-2],3]].forEach(([c,p,i])=>{
      const l=new THREE.PointLight(c,i,18);l.position.set(...p);scene.add(l);
    });
    const mat=(c,e)=>new THREE.MeshStandardMaterial({color:c,emissive:e,emissiveIntensity:0.55,roughness:0.1,metalness:1.0});
    const kGeo=new THREE.TorusKnotGeometry(1.05,0.32,200,24,2,3);
    const kMat=new THREE.MeshStandardMaterial({color:0x7c5cfc,emissive:0x6366f1,emissiveIntensity:0.55,roughness:0.08,metalness:1.0});
    const knot=new THREE.Mesh(kGeo,kMat);scene.add(knot);
    const orbData=[
      {r:.28,c:0x00f5ff,e:0x0ea5e9,o:2.6,s:.9,t:.4},{r:.20,c:0xff3dac,e:0xec4899,o:2.1,s:-1.4,t:1.1},
      {r:.22,c:0x39ff85,e:0x22c55e,o:2.9,s:.6,t:2.0},{r:.16,c:0xffb300,e:0xf59e0b,o:1.7,s:-2,t:.8},
      {r:.18,c:0xa78bfa,e:0x8b5cf6,o:3.2,s:1.1,t:1.5},
    ];
    const orbs=orbData.map(d=>{
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(d.r,32,32),mat(d.c,d.e));
      const pivot=new THREE.Object3D();pivot.rotation.z=d.t;pivot.rotation.x=d.t*0.5;
      mesh.position.set(d.o,0,0);pivot.add(mesh);scene.add(pivot);
      scene.add(new THREE.Mesh(new THREE.TorusGeometry(d.o,.008,8,100),new THREE.MeshBasicMaterial({color:d.e,transparent:true,opacity:.15})));
      return{pivot,speed:d.s};
    });
    const icoData=[
      {c:0x7c5cfc,e:0x4f46e5,p:[-3.2,1.8,-1],s:.45},{c:0x00f5ff,e:0x0891b2,p:[3.4,-1.5,-.5],s:.38},
      {c:0xff3dac,e:0xdb2777,p:[-3,-2,.5],s:.32},{c:0x39ff85,e:0x16a34a,p:[3,2.2,-1.5],s:.28},
    ];
    const icos=icoData.map(d=>{
      const mesh=new THREE.Mesh(new THREE.IcosahedronGeometry(d.s,0),mat(d.c,d.e));
      mesh.position.set(...d.p);mesh.userData.baseY=d.p[1];mesh.userData.ph=Math.random()*Math.PI*2;
      scene.add(mesh);return mesh;
    });
    const pCount=320,pPos=new Float32Array(pCount*3),pCol=new Float32Array(pCount*3);
    const pal=[[.49,.36,.99],[.0,.96,1],[1,.24,.67],[.22,1,.52],[1,.7,.08]];
    for(let i=0;i<pCount;i++){
      const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=3.8+Math.random()*2.5;
      pPos[i*3]=r*Math.sin(ph)*Math.cos(th);pPos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pPos[i*3+2]=r*Math.cos(ph);
      const c=pal[i%pal.length];pCol[i*3]=c[0];pCol[i*3+1]=c[1];pCol[i*3+2]=c[2];
    }
    const pGeo=new THREE.BufferGeometry();
    pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
    pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
    scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({size:.05,vertexColors:true,transparent:true,opacity:.9})));
    let mx2=0,my2=0;
    const onM=e=>{mx2=(e.clientX/window.innerWidth-0.5)*2;my2=(e.clientY/window.innerHeight-0.5)*2;};
    window.addEventListener('mousemove',onM);
    const onR=()=>{W=el.clientWidth;H=el.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);};
    window.addEventListener('resize',onR);
    let frame,t=0;
    const animate=()=>{
      frame=requestAnimationFrame(animate);t+=.008;
      knot.rotation.x+=.004;knot.rotation.y+=.007;
      const hue=(t*.15)%1;
      kMat.emissive.setHSL(hue,1,.5);kMat.color.setHSL((hue+.05)%1,.9,.6);
      kMat.emissiveIntensity=.55+Math.sin(t*2)*.2;
      orbs.forEach(o=>{o.pivot.rotation.y+=o.speed*.012;o.pivot.rotation.x+=o.speed*.004;});
      icos.forEach(m=>{m.rotation.x+=.012;m.rotation.z+=.008;m.position.y=m.userData.baseY+Math.sin(t*1.2+m.userData.ph)*.25;});
      camera.position.x+=(mx2*.8-camera.position.x)*.04;
      camera.position.y+=(-my2*.6-camera.position.y)*.04;
      camera.lookAt(0,0,0);renderer.render(scene,camera);
    };
    animate();
    return()=>{cancelAnimationFrame(frame);window.removeEventListener('mousemove',onM);window.removeEventListener('resize',onR);renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);};
  },[]);
  return <div ref={mountRef} style={{width:'100%',height:'min(620px,70vw)',minHeight:'320px',borderRadius:'4px',overflow:'hidden'}}/>;
}

function FloatingGlyphs(){

function SHdr({num,title}){

function Rv({children,delay=0,dir='up',th=0.12}){
  const[ref,vis]=useScrollReveal(th);
  const tr={up:'translateY(36px)',left:'translateX(-44px)',right:'translateX(44px)',scale:'scale(0.92)'};

    <div ref={ref} style={{opacity:vis?1:0,transform:vis?'none':tr[dir],transition:`opacity .85s cubic-bezier(.16,1,.3,1) ${delay}s,transform .85s cubic-bezier(.16,1,.3,1) ${delay}s`}}>
      {children}

function SBar({label,pct}){

    </div>

function StatsAnimBg(){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    let W,H,animId;
    let scrollY=0;

    const resize=()=>{
      W=canvas.width=canvas.offsetWidth;
      H=canvas.height=canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize',resize);
    window.addEventListener('scroll',()=>{scrollY=window.scrollY;},{passive:true});

    /* Flowing lines */
    const lines=Array.from({length:18},(_,i)=>({
      x:Math.random()*1200,y:Math.random()*600,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.15,
      len:80+Math.random()*160,
      hue:220+Math.random()*60,
      alpha:0.04+Math.random()*0.08,
      thickness:0.5+Math.random()*1.5,
    }));

    /* Particles */
    const pts=Array.from({length:60},()=>({
      x:Math.random()*1200,y:Math.random()*600,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:0.5+Math.random()*1.5,
      col:['124,92,252','0,245,255','57,255,133','255,61,172'][Math.floor(Math.random()*4)],
      a:0.15+Math.random()*0.25,
    }));

    /* Grid dots */
    let t=0;
    const draw=()=>{
      animId=requestAnimationFrame(draw);
      const sect=document.getElementById('stats');
      const parallaxY=sect?(window.scrollY-sect.offsetTop)*0.18:0;
      ctx.clearRect(0,0,W,H);

      /* Subtle grid */
      ctx.save();
      ctx.strokeStyle='rgba(124,92,252,0.04)';
      ctx.lineWidth=1;
      const gs=60;
      for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      ctx.restore();

      /* Glowing orbs */
      const orbs=[
        {x:W*.15,y:H*.4+parallaxY*0.5,r:200,col:'124,92,252',a:.12},
        {x:W*.8,y:H*.2+parallaxY*0.3,r:180,col:'0,245,255',a:.09},
        {x:W*.5,y:H*.8+parallaxY*0.4,r:150,col:'255,61,172',a:.07},
      ];
      orbs.forEach(o=>{
        const grad=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
        grad.addColorStop(0,`rgba(${o.col},${o.a})`);
        grad.addColorStop(1,`rgba(${o.col},0)`);
        ctx.fillStyle=grad;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
      });

      /* Flowing lines with parallax */
      lines.forEach(l=>{
        l.x+=l.vx;l.y+=l.vy;
        if(l.x<-200)l.x=W+100;if(l.x>W+200)l.x=-100;
        if(l.y<-100)l.y=H+50;if(l.y>H+100)l.y=-50;
        const angle=Math.atan2(l.vy,l.vx);
        const parallaxOffset=parallaxY*0.06;
        ctx.save();
        ctx.globalAlpha=l.alpha*(0.7+0.3*Math.sin(t+l.x/100));
        const grad=ctx.createLinearGradient(
          l.x,l.y+parallaxOffset,
          l.x+Math.cos(angle)*l.len,l.y+Math.sin(angle)*l.len+parallaxOffset
        );
        grad.addColorStop(0,`hsla(${l.hue},80%,65%,0)`);
        grad.addColorStop(0.5,`hsla(${l.hue},80%,65%,1)`);
        grad.addColorStop(1,`hsla(${l.hue},80%,65%,0)`);
        ctx.strokeStyle=grad;ctx.lineWidth=l.thickness;
        ctx.beginPath();ctx.moveTo(l.x,l.y+parallaxOffset);
        ctx.lineTo(l.x+Math.cos(angle)*l.len,l.y+Math.sin(angle)*l.len+parallaxOffset);
        ctx.stroke();ctx.restore();
      });

      /* Particles */
      pts.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;
        if(p.y<0)p.y=H;if(p.y>H)p.y=0;
        ctx.beginPath();
        ctx.arc(p.x,p.y+parallaxY*0.05,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.col},${p.a})`;
        ctx.fill();
      });

      /* Scan line sweep */
      const sweepX=(t*60)%W;
      const sweepGrad=ctx.createLinearGradient(sweepX-40,0,sweepX+40,0);
      sweepGrad.addColorStop(0,'rgba(124,92,252,0)');
      sweepGrad.addColorStop(0.5,'rgba(124,92,252,0.04)');
      sweepGrad.addColorStop(1,'rgba(124,92,252,0)');
      ctx.fillStyle=sweepGrad;ctx.fillRect(sweepX-40,0,80,H);

      t+=.008;
    };
    draw();
    return()=>{cancelAnimationFrame(animId);window.removeEventListener('resize',resize);};
  },[]);
  return(
    <canvas ref={canvasRef} id="stats-canvas-bg" style={{
      position:'absolute',inset:0,width:'100%',height:'100%',
      pointerEvents:'none',zIndex:0,
    }}/>
  );
}

function Counter({target,suffix=''}){
  const[n,setN]=useState(0);
  const[ref,vis]=useScrollReveal(0.3);
  useEffect(()=>{
    if(!vis)return;
    let s=null;const dur=1800;
    const step=(ts)=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);const e=1-Math.pow(1-p,3);setN(Math.floor(e*target));if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  },[vis,target]);
  return<span ref={ref}>{n}{suffix}</span>;
}

function StatCard({num,suffix='',label,delay=0}){
  const[ref,vis]=useScrollReveal(0.2);
  return(
    <div ref={ref} className="stat-card" style={{opacity:vis?1:0,transform:vis?'none':'translateY(44px)',transition:`all .85s cubic-bezier(.16,1,.3,1) ${delay}s`}}>
      <div className="stat-shimmer"/>
      <div className="stat-num"><Counter target={num} suffix={suffix}/></div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

function TlItem({date,role,org,desc,tags,dot='',delay=0}){
  const[ref,vis]=useScrollReveal(0.15);
  return(

}

/* CONTACT FORM */
function ContactForm(){
  const[form,setForm]=useState({name:'',email:'',subject:'',message:''});
  const[sent,setSent]=useState(false);
  const[loading,setLoading]=useState(false);
  const[errors,setErrors]=useState({});
  const[touched,setTouched]=useState({});
  const[submitErr,setSubmitErr]=useState('');

  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  const validate=(f)=>{
    const e={};
    if(!f.name.trim())e.name='Name is required';
    else if(f.name.trim().length<2)e.name='Name must be at least 2 characters';
    if(!f.email.trim())e.email='Email is required';
    else if(!EMAIL_RE.test(f.email.trim()))e.email='Enter a valid email address';
    if(!f.message.trim())e.message='Message is required';
    else if(f.message.trim().length<10)e.message='Message must be at least 10 characters';
    return e;
  };

  const handle=(e)=>{
    const updated={...form,[e.target.name]:e.target.value};
    setForm(updated);
    if(touched[e.target.name]){
      const e2=validate(updated);
      setErrors(prev=>({...prev,[e.target.name]:e2[e.target.name]}));
    }
  };

  const blur=(e)=>{
    const field=e.target.name;
    setTouched(prev=>({...prev,[field]:true}));
    const e2=validate(form);
    setErrors(prev=>({...prev,[field]:e2[field]}));
  };

  const submit=async()=>{
    const allTouched={name:true,email:true,subject:true,message:true};
    setTouched(allTouched);
    const e2=validate(form);
    setErrors(e2);
    if(Object.keys(e2).length>0)return;

    setLoading(true);
    setSubmitErr('');
    try{
      const response=await fetch("https://formspree.io/f/mwvajkar",{
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify(form)
      });
      if(response.ok){
        setLoading(false);
        setSent(true);
        setForm({name:'',email:'',subject:'',message:''});
        setErrors({});setTouched({});
        setTimeout(()=>setSent(false),5000);
      }else{
        throw new Error("Transmission Failed");
      }
    }catch(error){
      setLoading(false);
      setSubmitErr('SYS_ERR: Could not transmit. Check connection and retry.');
    }
  };

  const fieldStyle=(name)=>({
    borderColor: touched[name]&&errors[name] ? 'rgba(255,61,172,0.7)' :
                 touched[name]&&!errors[name] ? 'rgba(57,255,133,0.5)' : undefined,
    boxShadow: touched[name]&&errors[name] ? '0 0 0 1px rgba(255,61,172,0.2)' :
               touched[name]&&!errors[name] ? '0 0 0 1px rgba(57,255,133,0.15)' : undefined,
  });

  return(
    <Rv delay={0.4}>
      <div className="cf-wrap">
        <div className="cf-title">SEND_MESSAGE</div>
        <div className="cf-grid">

          <div className="cf-field">
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Name *</span>
              {touched.name&&errors.name&&<span style={{color:'#ff3dac',fontSize:'.55rem',letterSpacing:'.05em',textTransform:'none',fontFamily:'var(--mono)'}}>{errors.name}</span>}
              {touched.name&&!errors.name&&form.name&&<span style={{color:'#39ff85',fontSize:'.55rem'}}>✓</span>}
            </label>
            <input name="name" value={form.name} onChange={handle} onBlur={blur}
              placeholder="Yehen Silva" autoComplete="off" style={fieldStyle('name')}/>
          </div>

          <div className="cf-field">
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Email *</span>
              {touched.email&&errors.email&&<span style={{color:'#ff3dac',fontSize:'.55rem',letterSpacing:'.05em',textTransform:'none',fontFamily:'var(--mono)'}}>{errors.email}</span>}
              {touched.email&&!errors.email&&form.email&&<span style={{color:'#39ff85',fontSize:'.55rem'}}>✓</span>}
            </label>
            <input name="email" type="email" value={form.email} onChange={handle} onBlur={blur}
              placeholder="you@example.com" autoComplete="off" style={fieldStyle('email')}/>
          </div>

          <div className="cf-field cf-full">
            <label style={{display:'flex',justifyContent:'space-between'}}>
              <span>Subject</span>
              <span style={{color:'rgba(255,255,255,.15)',fontSize:'.55rem',fontFamily:'var(--mono)',textTransform:'none'}}>{form.subject.length}/80</span>
            </label>
            <input name="subject" value={form.subject} onChange={handle} onBlur={blur}
              placeholder="Project collab / Just saying hi" autoComplete="off" maxLength={80}/>
          </div>

          <div className="cf-field cf-full">
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Message *</span>
              <span style={{display:'flex',gap:'.6rem',alignItems:'center'}}>
                {touched.message&&errors.message&&<span style={{color:'#ff3dac',fontSize:'.55rem',letterSpacing:'.05em',textTransform:'none',fontFamily:'var(--mono)'}}>{errors.message}</span>}
                {touched.message&&!errors.message&&form.message&&<span style={{color:'#39ff85',fontSize:'.55rem'}}>✓</span>}
                <span style={{color:'rgba(255,255,255,.15)',fontSize:'.55rem',fontFamily:'var(--mono)',textTransform:'none'}}>{form.message.length}/1000</span>
              </span>
            </label>
            <textarea name="message" value={form.message} onChange={handle} onBlur={blur}
              rows={5} placeholder="Tell me what you're building or thinking about..."
              maxLength={1000} style={fieldStyle('message')}/>
          </div>
        </div>

        {submitErr&&<div style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'#ff3dac',letterSpacing:'.08em',padding:'.6rem 1rem',border:'1px solid rgba(255,61,172,0.25)',background:'rgba(255,61,172,.05)',marginTop:'1rem'}}>{submitErr}</div>}

        <div className="cf-submit">
          <span className="cf-note">* Required — all data sent securely via Formspree</span>
          {sent
            ? <div className="cf-success show">[ OK ] MESSAGE_TRANSMITTED ✓</div>
            : <button className="btn-p" onClick={submit} disabled={loading}
                style={{opacity:loading?.7:1,cursor:loading?'wait':'pointer'}}>
                {loading?'TRANSMITTING...':'SEND MESSAGE →'}
              </button>
          }
        </div>
      </div>
    </Rv>
  );
}

<script>
/* ─── LINUX BOOT PRELOADER ─── */
document.addEventListener('DOMContentLoaded', () => {
  const logContainer = document.getElementById('boot-log');
  const bootBar = document.getElementById('boot-bar');
  const bootPct = document.getElementById('boot-pct');
  const bootScreen = document.getElementById('boot-screen');
  const strips = document.querySelectorAll('.reveal-strip');
  const nav = document.getElementById('main-nav');

  const logs = [
    { t: "[  0.000000] Initializing YehenOS v3.0 Kernel...", c: "boot-neon" },
    { t: "[  0.104212] Detected CPU: informatics_institute_tech (IIT)", c: "boot-info" },
    { t: "[  0.252001] Checking storage: 2TB Google One AI Pro mapping...", c: "boot-info" },
    { t: "[  0.412993] Initializing network: Sri Lanka Region Active", c: "" },
    { t: "[  0.650112] Loading Python 3.12 Interpreter... [  OK  ]", c: "boot-ok" },
    { t: "[  0.912554] Scanned Projects: 7 Repositories found at /github", c: "boot-cyan" },
    { t: "[  1.204551] Starting Waterqo_Trading_Marketing_Module...", c: "" },
    { t: "[  1.554021] Loading 'Speech-Recognition' core...", c: "boot-cyan" },
    { t: "[  1.842100] [ WARN ] Calibrating HydroManager DB...", c: "boot-warn" },
    { t: "[  2.102554] HydroManager DB Connection: Established", c: "boot-ok" },
    { t: "[  2.340012] Syncing TikTok/yehensilva content stream...", c: "" },
    { t: "[  2.550122] Preparing Portfolio Assets (Three.js)...", c: "boot-neon" },
    { t: "[  2.890412] Checking LinkedIn/yehensilva connectivity...", c: "" },
    { t: "[  3.100221] Finalizing system environment...", c: "boot-info" },
    { t: "[  3.400551] ALL SERVICES: [ ONLINE ]", c: "boot-ok" },
    { t: "[  3.600000] WELCOME YEHEN SILVA.", c: "boot-neon" }
  ];

  let currentLine = 0;

  function addLine() {
    if (currentLine < logs.length) {
      const line = document.createElement('div');
      line.className = 'boot-line ' + (logs[currentLine].c || '');
      line.textContent = logs[currentLine].t;
      logContainer.appendChild(line);
      void line.offsetWidth;
      line.classList.add('show');

      // Keep max 13 lines visible
      while (logContainer.childNodes.length > 13) {
        logContainer.removeChild(logContainer.firstChild);
      }

      const progress = ((currentLine + 1) / logs.length) * 100;
      bootBar.style.width = progress + '%';
      bootPct.textContent = Math.round(progress) + '%';

      currentLine++;
      let delay = 80 + Math.random() * 100;
      if (currentLine === 9) delay = 400; // pause on WARN
      setTimeout(addLine, delay);
    } else {
      // Boot complete — exit
      setTimeout(() => {
        bootScreen.classList.add('exit');
        document.body.classList.remove('loading');
        setTimeout(() => {
          bootScreen.style.display = 'none';
          strips.forEach((s, i) => { setTimeout(() => s.classList.add('gone'), i * 80); });
          setTimeout(() => {
            nav.classList.add('visible');
            const pr = document.getElementById('page-reveal');
            if (pr) pr.style.display = 'none';
          }, strips.length * 80 + 600);
        }, 800);
      }, 800);
    }
  }

  addLine();
});

/* HAMBURGER MENU */

const mobileMenu=document.getElementById('mobile-menu');

function toggleMenu(open){

  a.addEventListener('click',()=>toggleMenu(false));

/* CURSOR */
const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(a);})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('a,button,.proj,.tag,.stack-card,.stat-card,.cf-field input,.cf-field textarea')){
    cur.style.width='18px';cur.style.height='18px';curR.style.width='50px';curR.style.height='50px';curR.style.opacity='.8';cur.style.background='#7c5cfc';
  }else{cur.style.width='10px';cur.style.height='10px';curR.style.width='34px';curR.style.height='34px';curR.style.opacity='.4';cur.style.background='#00f5ff';}
});

/* PARTICLES */
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let W,H,parts=[];
function rsz(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
class P{
  constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.sz=Math.random()*1.2+.4;this.a=Math.random()*.25+.05;const nc=['124,92,252','0,245,255','57,255,133','255,61,172','255,179,0'];this.c=nc[Math.floor(Math.random()*nc.length)];}
  u(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=W;if(this.x>W)this.x=0;if(this.y<0)this.y=H;if(this.y>H)this.y=0;}
  d(){ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fillStyle=`rgba(${this.c},${this.a})`;ctx.fill();}
}
for(let i=0;i<90;i++)parts.push(new P());
function dp(){
  ctx.clearRect(0,0,W,H);parts.forEach(p=>{p.u();p.d();});
  for(let i=0;i<parts.length;i++){for(let j=i+1;j<parts.length;j++){
    const dx=parts[i].x-parts[j].x,dy=parts[i].y-parts[j].y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<120){ctx.beginPath();ctx.moveTo(parts[i].x,parts[i].y);ctx.lineTo(parts[j].x,parts[j].y);ctx.strokeStyle=`rgba(124,92,252,${.07*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}
  }}
  requestAnimationFrame(dp);
}
dp();

/* ═══════════════════════════════════════════════
   FULL SITE PARALLAX ENGINE
   ═══════════════════════════════════════════════ */
(function(){
  const VH = window.innerHeight;

  /* ── 1. HERO depth layers ── */
  function heroParallax(sy){
    document.querySelectorAll('.hero-aurora').forEach(el=>el.style.transform=`translateY(${sy*0.32}px)`);
    document.querySelectorAll('.hero-bg-grid').forEach(el=>el.style.transform=`translateY(${sy*0.14}px)`);
    // hero orbs — each at different depth
    const heroOrbs=document.querySelectorAll('#hero .p-orb');
    heroOrbs.forEach((el,i)=>el.style.transform=`translateY(${sy*(0.18+i*0.09)}px) scale(${1+sy*0.00005})`);
    // hero text drifts slightly
    const heroLeft=document.querySelector('.hero-left');
    if(heroLeft) heroLeft.style.transform=`translateY(${sy*0.07}px)`;
  }

  /* ── 2. Per-section orb parallax — relative to section top ── */
  function sectionOrbParallax(){
    document.querySelectorAll('.prlx-orb').forEach(el=>{
      const sec=el.closest('section')||el.closest('footer');
      if(!sec) return;
      const rect=sec.getBoundingClientRect();
      const rel=-(rect.top - VH*0.5); // 0 when section center is at viewport center
      const speed=parseFloat(el.dataset.speed||'0.18');
      const axis=el.dataset.axis||'y';
      if(axis==='x'){
        el.style.transform=`translateX(${rel*speed}px)`;
      } else {
        el.style.transform=`translateY(${rel*speed}px)`;
      }
    });
  }

  /* ── 3. Background layer parallax ── */
  function bgLayerParallax(){
    document.querySelectorAll('.prlx-bg').forEach(el=>{
      const sec=el.closest('section')||el.closest('footer');
      if(!sec) return;
      const rect=sec.getBoundingClientRect();
      const rel=-(rect.top);
      const speed=parseFloat(el.dataset.speed||'0.25');
      el.style.transform=`translateY(${rel*speed}px)`;
    });
  }

  /* ── 4. Scroll-reveal for prlx-enter elements ── */
  const revealObs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting) e.target.classList.add('in');
    });
  },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
  setTimeout(()=>{
    document.querySelectorAll('.prlx-enter,.prlx-enter-left,.prlx-enter-right,.prlx-enter-scale').forEach(el=>revealObs.observe(el));
  },600);

  /* ── 5. Marquee/marquee wrapper parallax ── */
  function marqueeParallax(sy){
    const mq=document.querySelector('.mq-wrap');
    if(mq){
      const rect=mq.getBoundingClientRect();
      const rel=-(rect.top-VH*0.5);
      mq.style.transform=`translateY(${rel*0.06}px)`;
    }
  }

  /* ── 6. Footer parallax ── */
  function footerParallax(){
    const ft=document.querySelector('footer');
    if(!ft) return;
    const rect=ft.getBoundingClientRect();
    const rel=-(rect.top-VH*0.5);
    // Footer orb
    const fOrb=ft.querySelector('.prlx-orb');
    if(fOrb) fOrb.style.transform=`translateY(${rel*0.22}px)`;
    // Footer logo drifts up slightly
    const fLogo=ft.querySelector('.f-logo');
    if(fLogo) fLogo.style.transform=`translateY(${rel*0.05}px)`;
    // Footer links drift at different rate
    const fLinks=ft.querySelector('.f-links');
    if(fLinks) fLinks.style.transform=`translateY(${rel*0.03}px)`;
  }

  /* ── 7. Stat cards subtle depth on scroll ── */
  function statCardParallax(){
    const grid=document.querySelector('.stats-grid');
    if(!grid) return;
    const rect=grid.getBoundingClientRect();
    const rel=-(rect.top-VH*0.5);
    grid.querySelectorAll('.stat-card').forEach((card,i)=>{
      const depth=(i%2===0?1:-1)*(i<2?1:-1);
      card.style.transform=`translateY(${rel*0.04*depth+(card.classList.contains('hovered')?-6:0)}px)`;
    });
  }

  /* ── 8. Stack cards wave parallax ── */
  function stackParallax(){
    const grid=document.querySelector('.stack-grid');
    if(!grid) return;
    const rect=grid.getBoundingClientRect();
    const rel=-(rect.top-VH*0.5);
    grid.querySelectorAll('.stack-card').forEach((card,i)=>{
      const wave=Math.sin((i/3)*Math.PI+rel*0.003)*rel*0.035;
      card.style.transform=`translateY(${wave}px)`;
    });
  }

  /* ── 9. Timeline items parallax ── */
  function timelineParallax(){
    document.querySelectorAll('.tl-item.on').forEach((item,i)=>{
      const rect=item.getBoundingClientRect();
      const rel=-(rect.top-VH*0.5);
      item.style.transform=`translateY(${rel*0.04}px)`;
    });
  }

  /* ── MAIN LOOP ── */
  let ticking=false;
  function onScroll(){
    if(ticking) return;
    ticking=true;
    requestAnimationFrame(()=>{
      const sy=window.scrollY;
      heroParallax(sy);
      sectionOrbParallax();
      bgLayerParallax();
      marqueeParallax(sy);
      footerParallax();
      statCardParallax();
      stackParallax();
      timelineParallax();
      ticking=false;
    });
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll(); // init
})();

/* NAV ACTIVE */
document.querySelectorAll('section[id]').forEach(sec=>{
  new IntersectionObserver(e=>{
    if(e[0].isIntersecting)document.querySelectorAll('.nav-links a').forEach(a=>{a.style.color=a.getAttribute('href')==='#'+sec.id?'#00f5ff':'';});
  },{threshold:.4}).observe(sec);
});

/* TIMELINE OBSERVER */
const tlObs=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting)entry.target.classList.add('on');});},{threshold:0.15});
setTimeout(()=>{document.querySelectorAll('.tl-item').forEach(el=>tlObs.observe(el));},500);
</script>
