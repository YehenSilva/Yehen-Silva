<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yehen Silva // Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg:#04040a; --surface:#080810; --panel:#0c0c18;
  --border:rgba(99,102,241,0.15); --accent:#6366f1;
  --accent-glow:rgba(99,102,241,0.25); --cyan:#22d3ee;
  --cyan-glow:rgba(34,211,238,0.2); --pink:#f472b6;
  --green:#4ade80; --text:#eeeef5; --muted:#52527a;
  --mono:'Share Tech Mono',monospace; --sans:'DM Sans',sans-serif; --display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;cursor:none;}
body.loading{overflow:hidden;}
#cur{position:fixed;width:8px;height:8px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .2s,height .2s;}
#cur-r{position:fixed;width:32px;height:32px;border:1px solid var(--accent);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.4;transition:all .15s;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:8000;}

/* PRELOADER */
#kinetic-preloader{position:fixed;inset:0;background:#000;color:#fff;z-index:10000;display:flex;align-items:center;justify-content:center;transform:translateY(100%);transition:transform 1.2s cubic-bezier(0.77,0,0.18,1);}
#kinetic-preloader.is-active{transform:translateY(0);}
#kinetic-preloader.slide-out{transform:translateY(-100%);}
.k-wrapper{text-align:center;}
#k-main-text{font-family:var(--display);font-size:clamp(40px,8vw,120px);font-weight:700;letter-spacing:-0.08em;opacity:0;transform:translateY(100%);transition:all 0.8s cubic-bezier(0.23,1,0.32,1);}
#k-main-text.reveal-text{opacity:1;transform:translateY(0);}
.k-bottom{margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:10px;}
#k-counter{font-family:var(--mono);font-size:18px;letter-spacing:0.2em;color:rgba(255,255,255,0.6);}
.k-progress-wrap{width:200px;height:2px;background:rgba(255,255,255,0.15);overflow:hidden;}
#k-progress{width:0%;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 0.2s linear;}

/* PAGE REVEAL */
#page-reveal{position:fixed;inset:0;z-index:9999;pointer-events:none;display:grid;grid-template-columns:repeat(5,1fr);}
.reveal-strip{background:var(--bg);transform:scaleY(1);transform-origin:bottom;transition:transform .9s cubic-bezier(.16,1,.3,1);}
.reveal-strip.gone{transform:scaleY(0);}

/* PARTICLES */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;}

/* PARALLAX ORBS */
.parallax-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.p-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.08;will-change:transform;}
.p-orb:nth-child(1){width:600px;height:600px;background:var(--accent);top:-120px;left:-120px;animation:orbA 14s ease-in-out infinite;}
.p-orb:nth-child(2){width:400px;height:400px;background:var(--cyan);top:40%;right:-80px;animation:orbB 10s ease-in-out infinite;}
.p-orb:nth-child(3){width:350px;height:350px;background:var(--pink);bottom:-60px;left:35%;animation:orbA 16s ease-in-out infinite reverse;}

/* FLOATING GLYPHS */
.fg{position:absolute;font-family:var(--mono);color:var(--accent);opacity:0;pointer-events:none;letter-spacing:.12em;animation:fgRise linear infinite;will-change:transform,opacity;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1.3rem 3rem;background:rgba(4,4,10,0.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transform:translateY(-100%);transition:transform .8s cubic-bezier(.16,1,.3,1);}
nav.visible{transform:translateY(0);}
.nav-id{font-family:var(--mono);font-size:.78rem;color:var(--accent);letter-spacing:.12em;display:flex;align-items:center;gap:.6rem;}
.nav-id::before{content:'>';color:var(--muted);animation:blink 1.2s step-end infinite;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-family:var(--mono);font-size:.68rem;color:var(--muted);text-decoration:none;letter-spacing:.15em;text-transform:uppercase;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--cyan);transition:width .3s;}
.nav-links a:hover{color:var(--cyan);}
.nav-links a:hover::after{width:100%;}
.nav-dot{display:flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.68rem;color:var(--muted);}
.dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:pulse 2s ease-in-out infinite;}

/* KEYFRAMES */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink2{0%,100%{opacity:1}50%{opacity:0}}
@keyframes scrollP{0%{opacity:1;transform:scaleY(1) translateY(0)}100%{opacity:0;transform:scaleY(.4) translateY(18px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes gradMove{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes rgbCycle{0%{filter:drop-shadow(0 0 8px #6366f1) drop-shadow(0 0 24px rgba(99,102,241,0.4));}25%{filter:drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 24px rgba(34,211,238,0.4));}50%{filter:drop-shadow(0 0 8px #4ade80) drop-shadow(0 0 24px rgba(74,222,128,0.4));}75%{filter:drop-shadow(0 0 8px #f472b6) drop-shadow(0 0 24px rgba(244,114,182,0.4));}100%{filter:drop-shadow(0 0 8px #6366f1) drop-shadow(0 0 24px rgba(99,102,241,0.4));}}
@keyframes auroraA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,3%) scale(1.1)}}
@keyframes auroraB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5%,-3%) scale(1.15)}}
@keyframes orbA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-25px) scale(1.1)}66%{transform:translate(-20px,35px) scale(0.93)}}
@keyframes orbB{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,20px)}}
@keyframes fgRise{0%{transform:translateY(100vh);opacity:0;}8%{opacity:.05;}90%{opacity:.05;}100%{transform:translateY(-20vh);opacity:0;}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes waveFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes badgeFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes borderPulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}50%{box-shadow:0 0 30px 2px rgba(99,102,241,0.15)}}
@keyframes tlIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}

/* HERO */
#hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:7rem 3rem 4rem;position:relative;overflow:hidden;gap:2rem;}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 90% 90% at 40% 50%,black,transparent);pointer-events:none;}
.hero-aurora{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.hero-aurora::before{content:'';position:absolute;width:600px;height:400px;background:radial-gradient(ellipse,rgba(99,102,241,.12) 0%,transparent 70%);top:10%;left:-10%;animation:auroraA 8s ease-in-out infinite;}
.hero-aurora::after{content:'';position:absolute;width:500px;height:350px;background:radial-gradient(ellipse,rgba(34,211,238,.08) 0%,transparent 70%);bottom:0;right:0;animation:auroraB 10s ease-in-out infinite;}
.hero-left{position:relative;z-index:2;}
.hero-eyebrow{font-family:var(--mono);font-size:.72rem;color:var(--cyan);letter-spacing:.25em;text-transform:uppercase;margin-bottom:1.4rem;display:flex;align-items:center;gap:.8rem;opacity:0;animation:fadeUp .8s .1s cubic-bezier(.16,1,.3,1) forwards;}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--cyan);}
.hero-name{font-family:var(--display);font-weight:800;font-size:clamp(3rem,5.5vw,5.5rem);line-height:.95;letter-spacing:-.03em;margin-bottom:1rem;}
.hero-name .n1{display:block;color:var(--text);overflow:hidden;}
.hero-name .n2{display:block;background:linear-gradient(110deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;overflow:hidden;}
.hero-name .n1-inner{display:block;animation:slideUp .9s .3s cubic-bezier(.16,1,.3,1) both;}
.hero-name .n2-inner{display:block;animation:slideUp .9s .45s cubic-bezier(.16,1,.3,1) both;}
.hero-role{font-family:var(--mono);font-size:.8rem;color:var(--muted);margin-bottom:1.8rem;line-height:2.1;opacity:0;animation:fadeUp .8s .6s cubic-bezier(.16,1,.3,1) forwards;}
.hero-role .hl{color:var(--cyan);}
.hero-bio{font-size:.93rem;color:#8080a8;line-height:1.85;max-width:440px;margin-bottom:2.2rem;opacity:0;animation:fadeUp .8s .75s cubic-bezier(.16,1,.3,1) forwards;}
.hero-bio strong{color:var(--text);font-weight:500;}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp .8s .9s cubic-bezier(.16,1,.3,1) forwards;margin-bottom:2rem;}
.btn-p{font-family:var(--mono);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;padding:.85rem 1.8rem;background:linear-gradient(135deg,var(--accent),var(--cyan));color:#fff;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:all .3s;position:relative;overflow:hidden;}
.btn-p::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);transform:translateX(-100%);transition:transform .4s;}
.btn-p:hover::after{transform:translateX(100%);}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 40px var(--accent-glow);}
.btn-g{font-family:var(--mono);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;padding:.85rem 1.8rem;background:transparent;color:var(--muted);border:1px solid var(--border);text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:all .3s;}
.btn-g:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 24px var(--accent-glow);transform:translateY(-2px);}
.term-mini{background:var(--panel);border:1px solid var(--border);padding:1.1rem 1.3rem;max-width:400px;opacity:0;animation:fadeUp .8s 1.1s cubic-bezier(.16,1,.3,1) forwards;position:relative;overflow:hidden;}
.term-mini::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.04),transparent);pointer-events:none;}
.term-bar{display:flex;gap:.4rem;margin-bottom:.9rem;align-items:center;}
.td{width:9px;height:9px;border-radius:50%;transition:transform .2s;}
.td:hover{transform:scale(1.3);}
.td:nth-child(1){background:#ff5f57}.td:nth-child(2){background:#febc2e}.td:nth-child(3){background:#28c840}
.term-ttl{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-left:auto;letter-spacing:.08em;}
.term-body{font-family:var(--mono);font-size:.73rem;line-height:2;color:var(--muted);}
.tp{color:var(--accent);}.tc{color:var(--text);}.to{padding-left:1.4rem;}.th{color:var(--cyan);}.tpk{color:var(--pink);}
.tc-blink::after{content:'█';color:var(--cyan);animation:blink2 1s step-end infinite;}
.hero-right{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeIn 1.2s 1s cubic-bezier(.16,1,.3,1) forwards;width:100%;}
.hero-right::before{content:'';position:absolute;width:500px;height:400px;background:radial-gradient(ellipse,rgba(99,102,241,.08) 0%,rgba(34,211,238,.05) 40%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:auroraA 6s ease-in-out infinite;}
.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:0;animation:fadeIn 1s 1.8s forwards;}
.scroll-hint span{font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
.scroll-ln{width:1px;height:36px;background:linear-gradient(to bottom,var(--accent),transparent);animation:scrollP 2s ease-in-out infinite;}

/* FLOATING BADGE */
.f-badge{position:absolute;font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;padding:.4rem .9rem;border:1px solid;text-transform:uppercase;backdrop-filter:blur(8px);pointer-events:none;z-index:3;animation:badgeFloat ease-in-out infinite;}

/* SECTIONS */
section{padding:7rem 3rem;position:relative;}
.sec-hdr{display:flex;align-items:center;gap:1.5rem;margin-bottom:4rem;}
.sec-num{font-family:var(--mono);font-size:.68rem;color:var(--accent);letter-spacing:.2em;}
.sec-title{font-family:var(--display);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;letter-spacing:-.02em;}
.sec-line{flex:1;height:1px;background:var(--border);position:relative;overflow:hidden;}
.sec-line::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--accent),transparent);transform:translateX(-100%);transition:transform 1.2s cubic-bezier(.16,1,.3,1) .4s;}
.sec-line.on::after{transform:translateX(0);}

/* ABOUT */
#about{border-top:1px solid var(--border);}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;}
.about-text p{font-size:.93rem;line-height:1.9;color:#8080a8;margin-bottom:1.4rem;}
.about-text p strong{color:var(--text);font-weight:500;}
.about-text .ac{color:var(--cyan);}
.sk-rows{display:flex;flex-direction:column;gap:1.1rem;}
.sk-row{display:flex;flex-direction:column;gap:.4rem;}
.sk-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.66rem;color:var(--muted);letter-spacing:.1em;}
.sk-bar{height:2px;background:rgba(255,255,255,.04);overflow:hidden;position:relative;}
.sk-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));width:0%;transition:width 1.6s cubic-bezier(.16,1,.3,1);}
.tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:2rem;}
.tag{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;padding:.35rem .8rem;border:1px solid var(--border);color:var(--muted);text-transform:uppercase;transition:all .25s;cursor:default;}
.tag:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.05);transform:translateY(-1px);}

/* STATS */
#stats{border-top:1px solid var(--border);background:var(--surface);}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;}
.stat-card{text-align:center;padding:2.5rem 1.5rem;border:1px solid var(--border);position:relative;overflow:hidden;transition:all .4s cubic-bezier(.16,1,.3,1);background:rgba(8,8,16,0.6);backdrop-filter:blur(10px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);transform:scaleX(0);transition:transform .6s cubic-bezier(.16,1,.3,1);}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.04),transparent);pointer-events:none;}
.stat-card:hover::before{transform:scaleX(1);}
.stat-card:hover{border-color:rgba(99,102,241,.4);transform:translateY(-6px);box-shadow:0 24px 60px rgba(99,102,241,.12);}
.stat-num{font-family:var(--display);font-size:clamp(2.5rem,5vw,4rem);font-weight:800;letter-spacing:-.04em;background:linear-gradient(110deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;}
.stat-label{font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:.6rem;position:relative;z-index:1;}
.stat-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);transform:translateX(-100%);}
.stat-card:hover .stat-shimmer{transition:transform .8s ease;transform:translateX(200%);}

/* PROJECTS */
#work{border-top:1px solid var(--border);background:var(--surface);}
.proj-list{display:flex;flex-direction:column;}
.proj{display:grid;grid-template-columns:60px 1fr 30px;gap:2rem;align-items:center;padding:1.8rem 0;border-bottom:1px solid var(--border);transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;}
.proj::before{content:'';position:absolute;left:-100%;top:0;bottom:0;width:100%;background:linear-gradient(90deg,transparent,rgba(99,102,241,.06),transparent);transition:left .6s cubic-bezier(.16,1,.3,1);}
.proj:hover::before{left:100%;}
.proj:hover{padding-left:.6rem;}
.proj:hover .proj-title{color:var(--accent);}
.proj:hover .proj-arr{transform:translate(3px,-3px);color:var(--accent);}
.proj-n{font-family:var(--mono);font-size:.66rem;color:var(--muted);letter-spacing:.15em;}
.proj-title{font-family:var(--display);font-size:1.25rem;font-weight:700;margin-bottom:.3rem;transition:color .3s;}
.proj-desc{font-size:.83rem;color:var(--muted);line-height:1.65;}
.proj-chips{display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap;}
.chip{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;padding:.2rem .55rem;background:rgba(34,211,238,.06);color:var(--cyan);border:1px solid rgba(34,211,238,.15);text-transform:uppercase;transition:all .2s;}
.chip:hover{background:rgba(34,211,238,.12);}
.proj-arr{font-size:1.1rem;color:var(--muted);font-family:var(--mono);transition:all .3s cubic-bezier(.16,1,.3,1);}

/* EXPERIENCE */
#experience{border-top:1px solid var(--border);}
.tl-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;}
.tl-col-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.2em;margin-bottom:2rem;}
.timeline{position:relative;padding-left:2rem;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--accent) 20%,var(--cyan) 80%,transparent);}
.tl-item{position:relative;padding:0 0 3rem 2.5rem;opacity:0;transform:translateX(-20px);transition:all .7s cubic-bezier(.16,1,.3,1);}
.tl-item.on{opacity:1;transform:none;}
.tl-dot{position:absolute;left:-2rem;top:.35rem;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);transform:translateX(-5px);box-shadow:0 0 16px var(--accent-glow);animation:pulse 2.5s ease-in-out infinite;}
.tl-dot.c{background:var(--cyan);box-shadow:0 0 16px var(--cyan-glow);}
.tl-dot.p{background:var(--pink);box-shadow:0 0 16px rgba(244,114,182,0.3);}
.tl-date{font-family:var(--mono);font-size:.65rem;color:var(--accent);letter-spacing:.15em;margin-bottom:.4rem;}
.tl-role{font-family:var(--display);font-size:1.1rem;font-weight:700;margin-bottom:.25rem;}
.tl-org{font-family:var(--mono);font-size:.7rem;color:var(--cyan);margin-bottom:.8rem;}
.tl-desc{font-size:.88rem;color:#7070a0;line-height:1.8;}
.tl-tags{display:flex;gap:.4rem;margin-top:.8rem;flex-wrap:wrap;}
.tl-tag{font-family:var(--mono);font-size:.58rem;padding:.2rem .6rem;border:1px solid rgba(99,102,241,.2);color:var(--muted);text-transform:uppercase;}

/* STACK */
#stack{border-top:1px solid var(--border);background:var(--surface);}
.stack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1rem;}
.stack-card{padding:1.4rem 1rem;border:1px solid var(--border);text-align:center;transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;background:rgba(8,8,20,0.6);cursor:default;}
.stack-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,rgba(99,102,241,.12),transparent 70%);opacity:0;transition:opacity .3s;}
.stack-card:hover::after{opacity:1;}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useScrollReveal(threshold=0.12){
  const ref=useRef(null);
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold});
    obs.observe(el); return()=>obs.disconnect();
  },[]);
  return[ref,vis];
}

function useParallax(speed=0.2){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    const h=()=>{
      const rect=el.getBoundingClientRect();
      const off=(rect.top+rect.height/2-window.innerHeight/2)*speed;
      el.style.transform=`translateY(${off}px)`;
    };
    window.addEventListener('scroll',h,{passive:true}); h();
    return()=>window.removeEventListener('scroll',h);
  },[speed]);
  return ref;
}

function useMouseParallax(strength=12){
  const ref=useRef(null);
  useEffect(()=>{
    const h=(e)=>{
      const el=ref.current; if(!el)return;
      const mx=(e.clientX/window.innerWidth-0.5)*2;
      const my=(e.clientY/window.innerHeight-0.5)*2;
      el.style.transform=`translate(${mx*strength}px,${my*(strength*0.6)}px)`;
    };
    window.addEventListener('mousemove',h);
    return()=>window.removeEventListener('mousemove',h);
  },[strength]);
  return ref;
}

/* THREE.JS SCENE */
function RGBPcScene(){
  const mountRef=useRef(null);
  useEffect(()=>{
    const el=mountRef.current; if(!el)return;
    let W=el.clientWidth, H=el.clientHeight;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(W,H); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    el.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(50,W/H,0.1,100);
    camera.position.set(0,0,7);
    scene.add(new THREE.AmbientLight(0x111122,0.6));
    [[0x6366f1,[4,4,3],6],[0x22d3ee,[-4,2,4],5],[0xf472b6,[0,-4,3],4],[0x4ade80,[-3,3,-2],3]].forEach(([c,p,i])=>{
      const l=new THREE.PointLight(c,i,18); l.position.set(...p); scene.add(l);
    });
    const mat=(col,em,r=0.2,m=0.9)=>new THREE.MeshStandardMaterial({color:col,emissive:em,emissiveIntensity:0.6,roughness:r,metalness:m});
    const knotGeo=new THREE.TorusKnotGeometry(1.05,0.32,200,24,2,3);
    const knotMat=new THREE.MeshStandardMaterial({color:0x7c3aed,emissive:0x6366f1,emissiveIntensity:0.5,roughness:0.1,metalness:1.0});
    const knot=new THREE.Mesh(knotGeo,knotMat); scene.add(knot);
    const orbData=[
      {r:0.28,c:0x22d3ee,em:0x0ea5e9,o:2.6,s:0.9,t:0.4},{r:0.20,c:0xf472b6,em:0xec4899,o:2.1,s:-1.4,t:1.1},
      {r:0.22,c:0x4ade80,em:0x22c55e,o:2.9,s:0.6,t:2.0},{r:0.16,c:0xfbbf24,em:0xf59e0b,o:1.7,s:-2.0,t:0.8},
      {r:0.18,c:0xa78bfa,em:0x8b5cf6,o:3.2,s:1.1,t:1.5},
    ];
    const orbs=orbData.map(d=>{
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(d.r,32,32),mat(d.c,d.em));
      const pivot=new THREE.Object3D(); pivot.rotation.z=d.t; pivot.rotation.x=d.t*0.5;
      mesh.position.set(d.o,0,0); pivot.add(mesh); scene.add(pivot);
      return{pivot,speed:d.s};
    });
    orbData.forEach(d=>{
      const ring=new THREE.Mesh(new THREE.TorusGeometry(d.o,0.008,8,100),new THREE.MeshBasicMaterial({color:d.em,transparent:true,opacity:0.18}));
      ring.rotation.x=d.t; ring.rotation.z=d.t*0.5; scene.add(ring);
    });
    const icoData=[
      {c:0x6366f1,em:0x4f46e5,p:[-3.2,1.8,-1],s:0.45},{c:0x22d3ee,em:0x0891b2,p:[3.4,-1.5,-0.5],s:0.38},
      {c:0xf472b6,em:0xdb2777,p:[-3.0,-2.0,0.5],s:0.32},{c:0x4ade80,em:0x16a34a,p:[3.0,2.2,-1.5],s:0.28},
    ];
    const icos=icoData.map(d=>{
      const mesh=new THREE.Mesh(new THREE.IcosahedronGeometry(d.s,0),mat(d.c,d.em,0.05,0.95));
      mesh.position.set(...d.p); mesh.userData.baseY=d.p[1]; mesh.userData.ph=Math.random()*Math.PI*2;
      scene.add(mesh); return mesh;
    });
    const pCount=320, pPos=new Float32Array(pCount*3), pCol=new Float32Array(pCount*3);
    const pal=[[0.39,0.40,0.95],[0.13,0.83,0.93],[0.96,0.45,0.71],[0.29,0.87,0.50],[1.0,0.75,0.14]];
    for(let i=0;i<pCount;i++){
      const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=3.8+Math.random()*2.5;
      pPos[i*3]=r*Math.sin(ph)*Math.cos(th); pPos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pPos[i*3+2]=r*Math.cos(ph);
      const c=pal[i%pal.length]; pCol[i*3]=c[0]; pCol[i*3+1]=c[1]; pCol[i*3+2]=c[2];
    }
    const pGeo=new THREE.BufferGeometry();
    pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
    pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
    scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.045,vertexColors:true,transparent:true,opacity:0.85})));
    let mx=0,my=0;
    const onM=e=>{mx=(e.clientX/window.innerWidth-0.5)*2; my=(e.clientY/window.innerHeight-0.5)*2;};
    window.addEventListener('mousemove',onM);
    const onR=()=>{W=el.clientWidth;H=el.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);};
    window.addEventListener('resize',onR);
    let frame,t=0;
    const animate=()=>{
      frame=requestAnimationFrame(animate); t+=0.008;
      knot.rotation.x+=0.004; knot.rotation.y+=0.007;
      const hue=(t*0.15)%1;
      knotMat.emissive.setHSL(hue,1,0.5); knotMat.color.setHSL((hue+0.05)%1,0.9,0.6);
      knotMat.emissiveIntensity=0.5+Math.sin(t*2)*0.2;
      orbs.forEach(o=>{o.pivot.rotation.y+=o.speed*0.012; o.pivot.rotation.x+=o.speed*0.004;});
      icos.forEach(m=>{m.rotation.x+=0.012; m.rotation.z+=0.008; m.position.y=m.userData.baseY+Math.sin(t*1.2+m.userData.ph)*0.25;});
      camera.position.x+=(mx*0.8-camera.position.x)*0.04;
      camera.position.y+=(-my*0.6-camera.position.y)*0.04;
      camera.lookAt(0,0,0); renderer.render(scene,camera);
    };
    animate();
    return()=>{cancelAnimationFrame(frame);window.removeEventListener('mousemove',onM);window.removeEventListener('resize',onR);renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);};
  },[]);
  return <div ref={mountRef} style={{width:'100%',height:'520px',borderRadius:'4px',overflow:'hidden'}}/>;
}

      </div>
    </div>
  );
}

/* ANIMATED COUNTER */
function Counter({target,suffix=''}){
  const[n,setN]=useState(0);
  const[ref,vis]=useScrollReveal(0.3);
  useEffect(()=>{
    if(!vis)return;
    let s=null;
    const dur=1800;
    const step=(ts)=>{
      if(!s)s=ts;
      const p=Math.min((ts-s)/dur,1);
      const e=1-Math.pow(1-p,3);
      setN(Math.floor(e*target));
      if(p<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[vis,target]);
  return<span ref={ref}>{n}{suffix}</span>;
}

<script>
/* KINETIC PRELOADER */
document.addEventListener('DOMContentLoaded', () => {
  const preloader=document.getElementById('kinetic-preloader');
  const mainText=document.getElementById('k-main-text');
  const counterEl=document.getElementById('k-counter');
  const progressBar=document.getElementById('k-progress');
  const strips=document.querySelectorAll('.reveal-strip');
  const nav=document.getElementById('main-nav');
  if(!preloader)return;
  document.body.classList.add('loading');
  setTimeout(()=>{preloader.classList.add('is-active');},50);
  const words=["FOUNDATION","DEVELOPMENT","SYSTEMS","EXECUTION","GROWTH"];
  let idx=0;
  function nextWord(){
    mainText.style.transform="translateY(-110%)"; mainText.style.opacity="0";
    setTimeout(()=>{
      idx++;
      if(idx<words.length){
        mainText.textContent=words[idx]; mainText.style.transition="none";
        mainText.style.transform="translateY(110%)"; void mainText.offsetWidth;
        mainText.style.transition="all 0.8s cubic-bezier(0.23,1,0.32,1)";
        mainText.style.transform="translateY(0)"; mainText.style.opacity="1";
        if(idx<words.length-1)setTimeout(nextWord,900);
      }
    },400);
  }
  setTimeout(()=>{mainText.classList.add('reveal-text');setTimeout(nextWord,1000);},900);
  let st=null; const dur=4000;
  function animCtr(time){
    if(!st)st=time;
    const p=Math.min((time-st)/dur,1);
    const e=1-Math.pow(1-p,4);
    const c=Math.floor(e*100);
    counterEl.textContent=c.toString().padStart(2,'0');
    progressBar.style.width=c+"%";
    if(p<1){requestAnimationFrame(animCtr);}else{exit();}
  }
  setTimeout(()=>{requestAnimationFrame(animCtr);},800);
  function exit(){
    preloader.classList.add('slide-out');
    setTimeout(()=>{
      preloader.remove(); document.body.classList.remove('loading','loading-lock');
      strips.forEach((s,i)=>{setTimeout(()=>s.classList.add('gone'),i*90);});
      setTimeout(()=>{nav.classList.add('visible');document.getElementById('page-reveal').style.display='none';},strips.length*90+700);
    },1200);
  }
});

/* CURSOR */
const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(a);})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('a,button,.proj,.tag,.stack-card,.stat-card')){
    cur.style.width='16px';cur.style.height='16px';curR.style.width='46px';curR.style.height='46px';curR.style.opacity='.7';
  }else{cur.style.width='8px';cur.style.height='8px';curR.style.width='32px';curR.style.height='32px';curR.style.opacity='.4';}
});

/* PARTICLES */
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let W,H,parts=[];
function rsz(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
rsz(); window.addEventListener('resize',rsz);
class P{
  constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.sz=Math.random()*1.2+.4;this.a=Math.random()*.5+.1;const r=Math.random();this.c=r<.33?'99,102,241':r<.66?'34,211,238':'74,222,128';}
  u(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=W;if(this.x>W)this.x=0;if(this.y<0)this.y=H;if(this.y>H)this.y=0;}
  d(){ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fillStyle=`rgba(${this.c},${this.a})`;ctx.fill();}
}
for(let i=0;i<90;i++)parts.push(new P());
function dp(){
  ctx.clearRect(0,0,W,H);
  parts.forEach(p=>{p.u();p.d();});
  for(let i=0;i<parts.length;i++){for(let j=i+1;j<parts.length;j++){
    const dx=parts[i].x-parts[j].x,dy=parts[i].y-parts[j].y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<120){ctx.beginPath();ctx.moveTo(parts[i].x,parts[i].y);ctx.lineTo(parts[j].x,parts[j].y);ctx.strokeStyle=`rgba(99,102,241,${.06*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}
  }}
  requestAnimationFrame(dp);
}
dp();

/* SCROLL PARALLAX */
window.addEventListener('scroll',()=>{
  const sy=window.scrollY;
  document.querySelectorAll('.hero-aurora').forEach(el=>{ el.style.transform=`translateY(${sy*0.25}px)`; });
  document.querySelectorAll('.p-orb').forEach((el,i)=>{ el.style.transform=`translateY(${sy*(0.08+i*0.04)}px)`; });
},{passive:true});

/* NAV ACTIVE */
document.querySelectorAll('section[id]').forEach(sec=>{
  new IntersectionObserver(e=>{
    if(e[0].isIntersecting)document.querySelectorAll('.nav-links a').forEach(a=>{
      a.style.color=a.getAttribute('href')==='#'+sec.id?'var(--cyan)':'';
    });
  },{threshold:.4}).observe(sec);
});

/* TIMELINE OBSERVER */
const tlObs=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{if(entry.isIntersecting)entry.target.classList.add('on');});
},{threshold:0.15});
setTimeout(()=>{document.querySelectorAll('.tl-item').forEach(el=>tlObs.observe(el));},500);
</script>
